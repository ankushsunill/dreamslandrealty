{% extends "base.html" %}
{% block title %}Add Property | Dreamsland Realty{% endblock %}

{% block content %}
<div class="max-w-5xl mx-auto px-4 py-8">
    <h2 class="text-2xl font-bold mb-6 text-center">Add New Property</h2>

    <div class="mb-6 border-b border-gray-200">
        <ul class="flex flex-wrap -mb-px text-sm font-medium text-center" id="tabs">
            <li class="me-2">
                <button class="tab-btn inline-block p-4 border-b-2 rounded-t-lg active" data-tab="basic-info">Basic
                    Info</button>
            </li>
            <li class="me-2">
                <button class="tab-btn inline-block p-4 border-b-2 rounded-t-lg" data-tab="images">Images</button>
            </li>
            <li class="me-2">
                <button class="tab-btn inline-block p-4 border-b-2 rounded-t-lg" data-tab="additional-info">Additional
                    Info</button>
            </li>
        </ul>
    </div>

    <form action="{% url 'add_property' %}" method="POST" enctype="multipart/form-data"
        class="space-y-6 bg-white p-6 rounded-xl shadow">
        {% csrf_token %}

        <!-- Basic Info Tab -->
        <div id="basic-info" class="tab-content">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block mb-1 font-semibold">Property Name</label>
                    <input type="text" name="name" class="w-full border px-3 py-2 rounded" required>
                </div>
                <div>
                    <label class="block mb-1 font-semibold">Location</label>
                    <input type="text" name="location" class="w-full border px-3 py-2 rounded" required>
                </div>
                <div>
                    <label class="block mb-1 font-semibold">Type</label>
                    <input type="text" name="type" class="w-full border px-3 py-2 rounded">
                </div>
                <div>
                    <label class="block mb-1 font-semibold">Subtype</label>
                    <input type="text" name="subtype" class="w-full border px-3 py-2 rounded">
                </div>
                <div>
                    <label class="block mb-1 font-semibold">BHK</label>
                    <input type="number" name="bhk" class="w-full border px-3 py-2 rounded">
                </div>
                <div>
                    <label class="block mb-1 font-semibold">Square Feet</label>
                    <input type="text" name="sqft" class="w-full border px-3 py-2 rounded">
                </div>
                <div>
                    <label class="block mb-1 font-semibold">Price</label>
                    <input type="number" name="price" class="w-full border px-3 py-2 rounded">
                </div>
                <div>
                    <label class="block mb-1 font-semibold">Plot Area</label>
                    <input type="text" name="plot_area" class="w-full border px-3 py-2 rounded">
                </div>
                <div>
                    <label class="block mb-1 font-semibold">Unit</label>
                    <input type="text" name="unit" class="w-full border px-3 py-2 rounded">
                </div>
                <div>
                    <label class="block mb-1 font-semibold">Listed On</label>
                    <input type="date" name="listed_on" class="w-full border px-3 py-2 rounded">
                </div>
            </div>
        </div>

        <!-- Images Tab -->
        <!-- Images Tab -->
        <div id="images" class="tab-content hidden">
            <label class="block mb-2 font-semibold">Upload Property Images</label>

            <!-- Dynamic File Inputs -->
            <div id="image-inputs-wrapper" class="space-y-2">
                <div class="flex items-center space-x-3">
                    <input type="file" name="images" accept="image/*"
                        class="w-full border px-3 py-2 rounded bg-gray-100" required>
                </div>
            </div>

            <!-- Add More Button -->
            <div class="mt-4">
                <button type="button" id="add-image-btn" class="text-blue-600 hover:underline text-sm">
                    + Add another image
                </button>
                <p id="image-limit-warning" class="text-sm text-red-500 hidden">Maximum of 10 images allowed.</p>
            </div>
        </div>



        <!-- Additional Info Tab -->
        <div id="additional-info" class="tab-content hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block mb-1 font-semibold">Owner Name</label>
                    <input type="text" name="owner_name" class="w-full border px-3 py-2 rounded">
                </div>
                <div>
                    <label class="block mb-1 font-semibold">Verified</label>
                    <select name="verified" class="w-full border px-3 py-2 rounded">
                        <option value="">Select</option>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                </div>
                <div>
                    <label class="block mb-1 font-semibold">Phone Number</label>
                    <input type="text" name="phone_number" class="w-full border px-3 py-2 rounded">
                </div>
                <div>
                    <label class="block mb-1 font-semibold">WhatsApp Number</label>
                    <input type="text" name="whatsapp_number" class="w-full border px-3 py-2 rounded">
                </div>
                <div>
                    <label class="block mb-1 font-semibold">Agent</label>
                    <input type="text" name="agent" class="w-full border px-3 py-2 rounded">
                </div>
                <div>
                    <label class="block mb-1 font-semibold">Status</label>
                    <input type="text" name="status" class="w-full border px-3 py-2 rounded">
                </div>
                <div>
                    <label class="block mb-1 font-semibold">Pricing Options</label>
                    <input type="text" name="pricing_options" class="w-full border px-3 py-2 rounded">
                </div>
                <div class="col-span-2">
                    <label class="block mb-1 font-semibold">Remarks</label>
                    <textarea name="remarks" rows="3" class="w-full border px-3 py-2 rounded"></textarea>
                </div>
                <div class="col-span-2">
                    <label class="block mb-1 font-semibold">Property Description</label>
                    <textarea name="property_description" rows="4" class="w-full border px-3 py-2 rounded"></textarea>
                </div>
            </div>
        </div>

        <!-- Submit Button -->
        <div class="text-center">
            <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">
                Submit Property
            </button>
        </div>
    </form>
</div>

<script>
    // Simple Tab Switcher
    const tabs = document.querySelectorAll('.tab-btn');
    const contents = document.querySelectorAll('.tab-content');

    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            // Deactivate all tabs and hide all content
            tabs.forEach(t => t.classList.remove('active', 'border-blue-500', 'text-blue-600'));
            contents.forEach(c => c.classList.add('hidden'));

            // Activate clicked tab
            tab.classList.add('active', 'border-blue-500', 'text-blue-600');
            document.getElementById(tab.dataset.tab).classList.remove('hidden');
        });
    });
</script>
<script>
    // Image upload field logic
    const wrapper = document.getElementById('image-inputs-wrapper');
    const addBtn = document.getElementById('add-image-btn');
    const warning = document.getElementById('image-limit-warning');

    addBtn.addEventListener('click', () => {
        const currentInputs = wrapper.querySelectorAll('input[type="file"]').length;
        if (currentInputs >= 10) {
            warning.classList.remove('hidden');
            return;
        }

        const div = document.createElement('div');
        div.className = "flex items-center space-x-3";
        div.innerHTML = `
            <input type="file" name="images" accept="image/*" class="w-full border px-3 py-2 rounded bg-gray-100" required>
            <button type="button" class="remove-btn text-red-500 hover:underline text-sm">Remove</button>
        `;
        wrapper.appendChild(div);

        // Hide warning if it was shown earlier
        warning.classList.add('hidden');
    });

    wrapper.addEventListener('click', function (e) {
        if (e.target.classList.contains('remove-btn')) {
            e.target.parentElement.remove();
            warning.classList.add('hidden');
        }
    });
</script>


{% endblock %}
